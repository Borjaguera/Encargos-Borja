<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Encargos Borja</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

h1{
color:#333;
}

form{
background:white;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:90%;
padding:10px;
margin:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
width:95%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Haz tu encargo 📦</h1>

<form id="formulario">

<input type="text" id="nombre" placeholder="Tu nombre" required>

<input type="text" id="telefono" placeholder="Tu teléfono" required>

<input type="text" id="producto" placeholder="¿Qué quieres encargar?" required>

<input type="number" id="cantidad" placeholder="Cantidad">

<textarea id="comentarios" placeholder="Comentarios"></textarea>

<button type="submit">Enviar encargo</button>

</form>

<script>

document.getElementById("formulario").addEventListener("submit", function(e){

e.preventDefault();

let nombre = document.getElementById("nombre").value;
let telefono = document.getElementById("telefono").value;
let producto = document.getElementById("producto").value;
let cantidad = document.getElementById("cantidad").value;
let comentarios = document.getElementById("comentarios").value;

let mensaje = "Nuevo encargo:%0A"
+ "Nombre: " + nombre + "%0A"
+ "Teléfono: " + telefono + "%0A"
+ "Producto: " + producto + "%0A"
+ "Cantidad: " + cantidad + "%0A"
+ "Comentarios: " + comentarios;

let numero = "34697819202";

window.open("https://wa.me/" + numero + "?text=" + mensaje);

});

</script>

</body>
</html>
